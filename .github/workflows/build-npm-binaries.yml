# Build Tish binaries, run tests, and on main push create a release branch + prerelease (with npm package and platform binaries).
# One "compile" job runs first to populate sccache + rust-cache; test and build jobs depend on it
# so they restore cached cargo and avoid a parallel compile stampede.

name: CI (test, coverage, build)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  compile:
    name: Compile (populate cache)
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: "true"

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # Build test suite only (no run). Test and build jobs restore this cache and use cached cargo.
      - name: Build tests
        run: cargo nextest run --no-run -p tishlang --features full --profile ci

  version:
    name: Get version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: set_version
        env:
          REPO_URL: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}
        run: |
          VER=""
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            npm install --prefix npm/tish --omit=optional 2>/dev/null || true
            node -e "
              const fs = require('fs');
              const p = require('./npm/tish/package.json');
              p.repository = { type: 'git', url: process.env.REPO_URL };
              fs.writeFileSync('./npm/tish/package.json', JSON.stringify(p, null, 2));
            "
            VER=$(cd npm/tish && npx semantic-release --dry-run --extends ../../.releaserc.json 2>&1 | sed -n 's/.*Published release \([0-9.]*\).*/\1/p' | head -1)
          fi
          if [ -z "$VER" ]; then
            VER=$(grep '^version' crates/tish/Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
            echo "Using Cargo.toml version: $VER"
          else
            echo "Using semantic-release version: $VER"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

  release_check:
    name: Release check (semantic-release dry-run)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm deps (semantic-release and plugins)
        run: npm install --prefix npm/tish

      - name: Set repository URL for current repo (supports fork)
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./npm/tish/package.json');
          p.repository = { type: 'git', url: process.env.REPO_URL };
          fs.writeFileSync('./npm/tish/package.json', JSON.stringify(p, null, 2));
          "
        env:
          REPO_URL: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}

      - name: Require incremental release (same logic as semantic-release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd npm/tish && npx semantic-release --dry-run --extends ../../.releaserc.json 2>&1 | tee release-check.log
          if grep -q "There are no relevant changes, so no new version is released." release-check.log; then
            echo "No incremental release would be triggered. Push commits that trigger a release (feat/fix/perf/BREAKING CHANGE per conventional commits)."
            exit 1
          fi
          echo "Release would be triggered - check passed."

  test:
    name: Test & coverage
    needs: [compile]
    runs-on: blacksmith-4vcpu-ubuntu-2204
    permissions:
      contents: read
      checks: write   # required for publish-unit-test-result-action (create check runs)
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: "true"

      - name: Install nextest and cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov

      # Restore cache from compile job, then run tests and coverage.
      - name: Run tests and coverage
        run: |
          cargo llvm-cov nextest -p tishlang --features full --no-fail-fast --profile ci \
            --lcov --output-path lcov.info
          mkdir -p test-results
          cp target/nextest/ci/junit.xml test-results/junit.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/junit.xml
          check_name: Test results

      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  build:
    needs: [compile, version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_name: tish
          - platform: linux-arm64
            os: blacksmith-4vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-gnu
            binary_name: tish
          - platform: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary_name: tish
          - platform: darwin-x64
            os: macos-14
            target: x86_64-apple-darwin
            binary_name: tish
          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: tish.exe

    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Cargo version for binary
        shell: bash
        run: |
          sed -i.bak "s/^version = .*/version = \"${{ needs.version.outputs.version }}\"/" crates/tish/Cargo.toml
          rm -f crates/tish/Cargo.toml.bak

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ needs.version.outputs.version }}
          cache-workspace-crates: "true"

      - name: Build (native / rustup target)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p tishlang --target ${{ matrix.target }}

      - name: Install cross and build (Linux ARM64)
        if: ${{ matrix.use_cross }}
        run: |
          cargo install cross
          cross build --target ${{ matrix.target }} -p tishlang --release

      - name: Stage binary for upload
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: staging/${{ matrix.binary_name }}

  release:
    name: Release (prerelease branch + GitHub API)
    needs: [build, test, release_check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts and assemble platform dir
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false

      - name: Create platform directory layout
        run: |
          mkdir -p npm/tish/platform/darwin-arm64
          mkdir -p npm/tish/platform/darwin-x64
          mkdir -p npm/tish/platform/linux-x64
          mkdir -p npm/tish/platform/linux-arm64
          mkdir -p npm/tish/platform/win32-x64

          cp artifacts/linux-x64/tish npm/tish/platform/linux-x64/tish
          cp artifacts/linux-arm64/tish npm/tish/platform/linux-arm64/tish
          cp artifacts/darwin-arm64/tish npm/tish/platform/darwin-arm64/tish
          cp artifacts/darwin-x64/tish npm/tish/platform/darwin-x64/tish
          cp artifacts/win32-x64/tish.exe npm/tish/platform/win32-x64/tish.exe

          chmod +x npm/tish/platform/linux-x64/tish
          chmod +x npm/tish/platform/linux-arm64/tish
          chmod +x npm/tish/platform/darwin-arm64/tish
          chmod +x npm/tish/platform/darwin-x64/tish

      - name: Create platform binaries zip
        run: |
          cd npm/tish && zip -r tish-platform-binaries.zip platform/ && cd ../..

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm deps (semantic-release and plugins)
        run: npm install --prefix npm/tish

      - name: Set repository URL for current repo (supports fork)
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./npm/tish/package.json');
          p.repository = { type: 'git', url: process.env.REPO_URL };
          fs.writeFileSync('./npm/tish/package.json', JSON.stringify(p, null, 2));
          "
        env:
          REPO_URL: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}

      - name: Get next version (semantic-release dry-run)
        id: next_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd npm/tish && npx semantic-release --dry-run --extends ../../.releaserc.json 2>&1 | tee release.log
          VERSION=$(sed -n 's/.*Published release \([0-9.]*\).*/\1/p' release.log | head -1)
          if [ -z "$VERSION" ]; then
            echo "Could not determine next version from semantic-release output"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $VERSION"

      - name: Set package version for npm pack
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./npm/tish/package.json');
          p.version = process.env.VERSION;
          fs.writeFileSync('./npm/tish/package.json', JSON.stringify(p, null, 2));
          "
        env:
          VERSION: ${{ steps.next_version.outputs.version }}

      - name: Copy workspace source for native compile (rust backend)
        run: |
          cp Cargo.toml npm/tish/
          cp LICENSE npm/tish/
          cp justfile npm/tish/
          cp -r crates npm/tish/
          sed -i.bak "s/^version = .*/version = \"${{ steps.next_version.outputs.version }}\"/" npm/tish/crates/tish/Cargo.toml
          rm -f npm/tish/crates/tish/Cargo.toml.bak

      - name: Create npm package tarball
        run: |
          cd npm/tish && npm pack && cd ../..
          mv npm/tish/tishlang-tish-*.tgz tish-npm-package.tgz

      - name: Create or update release branch and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="release/v${{ steps.next_version.outputs.version }}"
          git checkout -B "$BRANCH"
          git push origin "$BRANCH" --force

      - name: Generate release notes from commits
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "$LAST_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "")
          else
            CHANGELOG=$(git log -30 --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "")
          fi
          [ -z "$CHANGELOG" ] && CHANGELOG="- No commits to list"
          {
            echo "## Changes"
            echo ""
            echo "$CHANGELOG"
            echo ""
          } > release-body.md

      - name: Create or update GitHub prerelease via API
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.next_version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          BRANCH="release/v${VERSION}"
          BODY=$(cat release-body.md)
          # Create or update release (idempotent: PATCH if tag exists)
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"$BRANCH\",\"name\":\"$TAG\",\"body\":$(echo "$BODY" | jq -Rs .),\"prerelease\":true}")
          HTTP_CODE=$(echo "$RESP" | tail -n1)
          BODY_RESP=$(echo "$RESP" | sed '$d')
          if [ "$HTTP_CODE" = "201" ]; then
            echo "Created prerelease $TAG"
            RELEASE_ID=$(echo "$BODY_RESP" | jq -r .id)
          elif [ "$HTTP_CODE" = "422" ]; then
            # Tag/release may already exist (e.g. re-run); get release by tag and update
            RELEASE_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | jq -r .id)
            if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
              curl -s -X PATCH \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" \
                -d "{\"target_commitish\":\"$BRANCH\",\"body\":$(echo "$BODY" | jq -Rs .),\"prerelease\":true}"
              echo "Updated existing prerelease $TAG"
            else
              echo "Release creation failed (422) and could not find release by tag"
              exit 1
            fi
          else
            echo "Unexpected response: $HTTP_CODE"
            echo "$BODY_RESP"
            exit 1
          fi
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload platform binaries to prerelease (individual + zip)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID="${{ steps.create_release.outputs.release_id }}"
          REPO="${{ github.repository }}"
          UPLOAD_URL="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets"
          AUTH="Authorization: Bearer $GITHUB_TOKEN"
          ACCEPT="Accept: application/vnd.github+json"
          API_VER="X-GitHub-Api-Version: 2022-11-28"

          upload_asset() {
            local path="$1" name="$2" label="$3" ctype="$4"
            local label_enc
            label_enc=$(printf %s "$label" | jq -sRr @uri)
            curl -s -X POST -H "$AUTH" -H "$ACCEPT" -H "$API_VER" \
              -H "Content-Type: $ctype" \
              --data-binary @"$path" \
              "${UPLOAD_URL}?name=${name}&label=${label_enc}"
          }

          cd npm/tish/platform
          upload_asset linux-x64/tish "tish-linux-x64" "Linux (x64)" "application/octet-stream"
          upload_asset linux-arm64/tish "tish-linux-arm64" "Linux (ARM64)" "application/octet-stream"
          upload_asset darwin-arm64/tish "tish-darwin-arm64" "macOS (Apple Silicon)" "application/octet-stream"
          upload_asset darwin-x64/tish "tish-darwin-x64" "macOS (Intel)" "application/octet-stream"
          upload_asset win32-x64/tish.exe "tish-win32-x64.exe" "Windows (x64)" "application/octet-stream"
          cd ../../..
          upload_asset npm/tish/tish-platform-binaries.zip "tish-platform-binaries.zip" "Platform binaries (all OS)" "application/zip"
          upload_asset tish-npm-package.tgz "tish-npm-package.tgz" "npm package (publish with: npm publish)" "application/octet-stream"
