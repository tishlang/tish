# Build Tish binaries, run tests with results and coverage, and assemble platform artifacts.
# One "compile" job runs first to populate sccache + rust-cache; test and build jobs depend on it
# so they restore cached cargo and avoid a parallel compile stampede.

name: CI (test, coverage, build)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  compile:
    name: Compile (populate cache)
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: "true"

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # Build test suite only (no run). Test and build jobs restore this cache and use cached cargo.
      - name: Build tests
        run: cargo nextest run --no-run -p tish --features full --profile ci

  release_check:
    name: Release check (conventional commits)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require release-worthy conventional commits
        run: |
          # If no previous tag, allow release (e.g. first release)
          if ! LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null); then
            echo "No previous tag found - allowing release."
            exit 0
          fi
          COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"%s%n%b" --no-merges)
          if echo "$COMMITS" | grep -qE '^(feat|fix|perf)(!)?(\([^)]*\))?:'; then
            echo "Conventional commits (feat/fix/perf) detected - release will run."
            exit 0
          fi
          if echo "$COMMITS" | grep -q 'BREAKING CHANGE'; then
            echo "Breaking change detected - release will run."
            exit 0
          fi
          echo "No release-worthy conventional commits since $LAST_TAG."
          echo "Use feat:, fix:, or perf: (or BREAKING CHANGE) to trigger a release."
          exit 1

  test:
    name: Test & coverage
    needs: [compile]
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: "true"

      - name: Install nextest and cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov

      # Restore cache from compile job, then run tests and coverage.
      - name: Run tests and coverage
        run: |
          cargo llvm-cov nextest -p tish --features full --no-fail-fast --profile ci \
            --lcov --output-path lcov.info
          mkdir -p test-results
          cp target/nextest/ci/junit.xml test-results/junit.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/junit.xml
          check_name: Test results

      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  build:
    needs: [compile]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_name: tish
          - platform: linux-arm64
            os: blacksmith-4vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-gnu
            binary_name: tish
          - platform: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary_name: tish
          - platform: darwin-x64
            os: macos-14
            target: x86_64-apple-darwin
            binary_name: tish
          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: tish.exe

    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-workspace-crates: "true"

      - name: Build (native / rustup target)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p tish --target ${{ matrix.target }}

      - name: Install cross and build (Linux ARM64)
        if: ${{ matrix.use_cross }}
        run: |
          cargo install cross
          cross build --target ${{ matrix.target }} -p tish --release

      - name: Stage binary for upload
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: staging/${{ matrix.binary_name }}

  assemble:
    name: Assemble platform dir
    needs: [build, test]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false

      - name: Create platform directory layout
        run: |
          mkdir -p npm/tish/platform/darwin-arm64
          mkdir -p npm/tish/platform/darwin-x64
          mkdir -p npm/tish/platform/linux-x64
          mkdir -p npm/tish/platform/linux-arm64
          mkdir -p npm/tish/platform/win32-x64

          cp artifacts/linux-x64/tish npm/tish/platform/linux-x64/tish
          cp artifacts/linux-arm64/tish npm/tish/platform/linux-arm64/tish
          cp artifacts/darwin-arm64/tish npm/tish/platform/darwin-arm64/tish
          cp artifacts/darwin-x64/tish npm/tish/platform/darwin-x64/tish
          cp artifacts/win32-x64/tish.exe npm/tish/platform/win32-x64/tish.exe

          chmod +x npm/tish/platform/linux-x64/tish
          chmod +x npm/tish/platform/linux-arm64/tish
          chmod +x npm/tish/platform/darwin-arm64/tish
          chmod +x npm/tish/platform/darwin-x64/tish

      - name: Upload assembled platform dir
        uses: actions/upload-artifact@v4
        with:
          name: npm-tish-platform-binaries
          path: npm/tish/platform/

  release:
    name: Release (GitHub only)
    needs: [assemble, release_check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          name: npm-tish-platform-binaries
          path: npm/tish/platform/

      - name: Make binaries executable
        run: |
          chmod +x npm/tish/platform/linux-x64/tish
          chmod +x npm/tish/platform/linux-arm64/tish
          chmod +x npm/tish/platform/darwin-arm64/tish
          chmod +x npm/tish/platform/darwin-x64/tish

      - name: Create platform binaries zip
        run: |
          cd npm/tish && zip -r tish-platform-binaries.zip platform/ && cd ../..

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm deps (semantic-release and plugins)
        run: npm install --prefix npm/tish

      - name: Set repository URL for current repo (supports fork)
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./npm/tish/package.json');
          p.repository = { type: 'git', url: process.env.REPO_URL };
          fs.writeFileSync('./npm/tish/package.json', JSON.stringify(p, null, 2));
          "
        env:
          REPO_URL: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}

      - name: Semantic release (GitHub release + tag + version bump, no npm publish)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd npm/tish && npx semantic-release --extends ../../.releaserc.json
