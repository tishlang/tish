# Build Tish binaries, run tests with results and coverage, and assemble platform artifacts.
# On every push/PR to main: test + coverage on Ubuntu; build binaries per platform; assemble.

name: CI (test, coverage, build)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & coverage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests (tish, full features)
        run: |
          cargo nextest run -p tish --features full --no-fail-fast --profile ci
          mkdir -p test-results
          cp target/nextest/ci/junit.xml test-results/junit.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/junit.xml
          check_name: Test results

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov test -p tish --features full --lcov --output-path lcov.info

      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload coverage (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_name: tish
          - platform: linux-arm64
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            binary_name: tish
            use_cross: true
          - platform: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary_name: tish
          - platform: darwin-x64
            os: macos-14
            target: x86_64-apple-darwin
            binary_name: tish
          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: tish.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (native / rustup target)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p tish --target ${{ matrix.target }}

      - name: Install cross and build (Linux ARM64)
        if: ${{ matrix.use_cross }}
        run: |
          cargo install cross
          cross build --target ${{ matrix.target }} -p tish --release

      - name: Stage binary for upload
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: staging/${{ matrix.binary_name }}

  assemble:
    name: Assemble platform dir
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false

      - name: Create platform directory layout
        run: |
          mkdir -p npm/tish/platform/darwin-arm64
          mkdir -p npm/tish/platform/darwin-x64
          mkdir -p npm/tish/platform/linux-x64
          mkdir -p npm/tish/platform/linux-arm64
          mkdir -p npm/tish/platform/win32-x64

          cp artifacts/linux-x64/tish npm/tish/platform/linux-x64/tish
          cp artifacts/linux-arm64/tish npm/tish/platform/linux-arm64/tish
          cp artifacts/darwin-arm64/tish npm/tish/platform/darwin-arm64/tish
          cp artifacts/darwin-x64/tish npm/tish/platform/darwin-x64/tish
          cp artifacts/win32-x64/tish.exe npm/tish/platform/win32-x64/tish.exe

          chmod +x npm/tish/platform/linux-x64/tish
          chmod +x npm/tish/platform/linux-arm64/tish
          chmod +x npm/tish/platform/darwin-arm64/tish
          chmod +x npm/tish/platform/darwin-x64/tish

      - name: Upload assembled platform dir
        uses: actions/upload-artifact@v4
        with:
          name: npm-tish-platform-binaries
          path: npm/tish/platform/

  release:
    name: Release (semantic version + GitHub + npm)
    needs: [assemble]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          name: npm-tish-platform-binaries
          path: npm/tish/platform/

      - name: Make binaries executable
        run: |
          chmod +x npm/tish/platform/linux-x64/tish
          chmod +x npm/tish/platform/linux-arm64/tish
          chmod +x npm/tish/platform/darwin-arm64/tish
          chmod +x npm/tish/platform/darwin-x64/tish

      - name: Create platform binaries zip
        run: |
          cd npm/tish && zip -r tish-platform-binaries.zip platform/ && cd ../..

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release and plugins
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/npm \
            @semantic-release/github

      - name: Semantic release (tish package)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/tish && npx semantic-release --extends ../../.releaserc.json
        continue-on-error: true

      - name: Sync version and publish create-tish-app
        if: success()
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./npm/tish/package.json').version")
          cd npm/create-tish-app
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public
        continue-on-error: true
