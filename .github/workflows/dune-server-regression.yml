name: dune-server regression

# Native build + end-to-end drive of a distilled dune-server, guarding the tish primitives Dune's
# headless backend depends on (hyper serve(), HTTP→WS upgrade + wsAccept, tish:pty, fs stat/readDir,
# process, Promise.spawn). These are largely native-only and unexercised by the rest of the suite.
# Manifest + driver: regression/dune-server/.

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "crates/tish_runtime/**"
      - "crates/tish_compile/**"
      - "regression/dune-server/**"
  push:
    branches: [main]
    paths:
      - "crates/tish_runtime/**"
      - "crates/tish_compile/**"
      - "regression/dune-server/**"

permissions:
  contents: read

jobs:
  dune-server:
    name: distilled dune-server vs tish HEAD
    runs-on: ubuntu-latest
    # Fleet-safe target-cpu (#223): `tish build` compiles server.tish natively and appends
    # `-C target-cpu=native` UNLESS RUSTFLAGS already pins a target-cpu (tish_build_utils). On the
    # virtualized runner `native` detects instructions that then SIGILL at runtime (Illegal
    # instruction, core dumped) — the recurring dune-server flake. Pin x86-64-v3 so the native build
    # is fleet-safe, mirroring packed-arrays.yml.
    env:
      RUSTFLAGS: "-C target-cpu=x86-64-v3"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: dune-server-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build tish CLI
        run: cargo build --release --features full

      - name: Run dune-server regression
        run: bash regression/dune-server/run.sh
