# Publish to npm when a GitHub release is created or updated.
# Keeps npm packages in sync with GitHub releases; GitHub is the source of truth.

name: NPM release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish @tishlang/tish
        working-directory: npm/tish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Sync version and publish create-tish-app
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./npm/tish/package.json').version")
          cd npm/create-tish-app
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public
