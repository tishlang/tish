# Publish to npm when a GitHub release is promoted from prerelease to full release.
# Downloads the npm package tarball from the release (no rebuild).
#
# AUTH: npm OIDC trusted publishing (no long-lived NPM_TOKEN — npm revoked classic
# tokens on 2026-12-09 and forces granular tokens to expire, so OIDC is the only
# durable option). This requires a ONE-TIME setup on npmjs.com for EACH package
# below; until that is done a publish fails with E404/E422. For every package
# (@tishlang/tish, @tishlang/cargo-bindgen, @tishlang/tish-format, @tishlang/tish-lint,
# @tishlang/pg, @tishlang/create-tish-app, and unscoped create-tish-app) open
# npmjs.com > the package > Settings >
# "Trusted Publisher" > GitHub Actions and set:
#   Organization or user: tishlang
#   Repository:           tish
#   Workflow filename:    npm-release.yml
#   Environment:          (leave blank)
# Requires npm >= 11.5.1 (upgraded below) and the id-token: write permission.

name: NPM release

on:
  release:
    types: [published, edited]

jobs:
  publish:
    name: Publish to npm
    # Only run when this is a full release (not a prerelease)
    if: github.event.release.prerelease == false
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write   # required to update release body via API
      id-token: write   # required for npm OIDC trusted publishing
    env:
      # No NODE_AUTH_TOKEN — auth is via OIDC (see trusted-publishing note at top).
      # Provenance is disabled because @tishlang/tish and @tishlang/cargo-bindgen
      # publish from pre-built tarballs (built in build-npm-binaries.yml, not this
      # run), which is the fragile case for provenance. To enable it later, remove
      # this line and confirm the two tarball publishes still succeed.
      NPM_CONFIG_PROVENANCE: "false"
    steps:
      - name: Checkout (for create-tish-app)
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Download npm package tarball from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_URL=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name == "tish-npm-package.tgz") | .url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Release has no asset tish-npm-package.tgz"
            exit 1
          fi
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$ASSET_URL" -o tish-npm-package.tgz
          ASSET_URL_BINDGEN=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name == "cargo-bindgen-npm-package.tgz") | .url')
          if [ -z "$ASSET_URL_BINDGEN" ] || [ "$ASSET_URL_BINDGEN" = "null" ]; then
            echo "Release has no asset cargo-bindgen-npm-package.tgz"
            exit 1
          fi
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$ASSET_URL_BINDGEN" -o cargo-bindgen-npm-package.tgz
          ASSET_URL_FORMAT=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name == "tish-format-npm-package.tgz") | .url')
          if [ -z "$ASSET_URL_FORMAT" ] || [ "$ASSET_URL_FORMAT" = "null" ]; then
            echo "Release has no asset tish-format-npm-package.tgz"
            exit 1
          fi
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$ASSET_URL_FORMAT" -o tish-format-npm-package.tgz
          ASSET_URL_LINT=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name == "tish-lint-npm-package.tgz") | .url')
          if [ -z "$ASSET_URL_LINT" ] || [ "$ASSET_URL_LINT" = "null" ]; then
            echo "Release has no asset tish-lint-npm-package.tgz"
            exit 1
          fi
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$ASSET_URL_LINT" -o tish-lint-npm-package.tgz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing (needs >= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Publish @tishlang/tish from tarball
        run: npm publish tish-npm-package.tgz --access public

      - name: Publish @tishlang/cargo-bindgen from tarball
        run: npm publish cargo-bindgen-npm-package.tgz --access public

      - name: Publish @tishlang/tish-format from tarball
        run: npm publish tish-format-npm-package.tgz --access public

      - name: Publish @tishlang/tish-lint from tarball
        run: npm publish tish-lint-npm-package.tgz --access public

      - name: Publish @tishlang/pg
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          cp -r npm/pg /tmp/pg-publish
          cd /tmp/pg-publish
          npm version $VERSION --no-git-tag-version --allow-same-version
          npm publish --access public

      # Scoped package: needs its own trusted-publisher entry on npmjs.com (see note at top).
      - name: Publish @tishlang/create-tish-app
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          cp -r npm/create-tish-app /tmp/create-tish-app-publish
          cd /tmp/create-tish-app-publish
          npm version $VERSION --no-git-tag-version --allow-same-version
          npm publish --access public

      # Unscoped name is a separate package and needs its own trusted-publisher entry on
      # npmjs.com (org tishlang / repo tish / workflow npm-release.yml). Without it OIDC auth
      # fails for this package only. This step always exits 0 so the release job stays green;
      # use ::warning:: for visibility in the log.
      - name: Publish unscoped create-tish-app (optional)
        run: |
          cd /tmp/create-tish-app-publish
          node -e "
            const fs = require('fs');
            const p = require('./package.json');
            p.name = 'create-tish-app';
            fs.writeFileSync('./package.json', JSON.stringify(p, null, 2));
          "
          if npm publish --access public; then
            echo "Published unscoped create-tish-app (npx create-tish-app)."
          else
            echo "::warning::Unscoped create-tish-app publish failed (usually no trusted-publisher configured for it on npmjs.com). Scoped package @tishlang/create-tish-app is already published — use npx @tishlang/create-tish-app. To fix: add a Trusted Publisher (org tishlang / repo tish / workflow npm-release.yml) at https://www.npmjs.com/package/create-tish-app/access"
          fi

      - name: Update release description with npm URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          NPM_URL="https://www.npmjs.com/package/@tishlang/tish/v/${VERSION}"
          NPM_BINDGEN_URL="https://www.npmjs.com/package/@tishlang/cargo-bindgen/v/${VERSION}"
          NPM_FORMAT_URL="https://www.npmjs.com/package/@tishlang/tish-format/v/${VERSION}"
          NPM_LINT_URL="https://www.npmjs.com/package/@tishlang/tish-lint/v/${VERSION}"
          CTA_SCOPED="https://www.npmjs.com/package/@tishlang/create-tish-app/v/${VERSION}"
          CTA_UNSCOPED="https://www.npmjs.com/package/create-tish-app/v/${VERSION}"
          CRATES_URL="https://crates.io/crates/tishlang/${VERSION}"
          RELEASE_ID="${{ github.event.release.id }}"
          REPO="${{ github.repository }}"
          CURRENT_BODY=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}" | jq -r '.body // ""')
          NEW_BODY="${CURRENT_BODY}

          ---
          Published to npm: ${NPM_URL} | cargo-bindgen: ${NPM_BINDGEN_URL} | tish-format: ${NPM_FORMAT_URL} | tish-lint: ${NPM_LINT_URL} | create-tish-app: ${CTA_SCOPED} · ${CTA_UNSCOPED} | crates.io: ${CRATES_URL}"
          curl -s -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}" \
            -d "$(printf '%s' "$NEW_BODY" | jq -Rs '{body: .}')"
