name: Tish security tooling

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/tish_lint/**"
      - "tree-sitter-tish/**"
      - "examples/**"
      - ".github/workflows/tish-security.yml"
  pull_request:
    paths:
      - "crates/tish_lint/**"
      - "tree-sitter-tish/**"
      - "examples/**"
      - ".github/workflows/tish-security.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  tish-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build tish-lint
        run: cargo build -p tishlang_lint --bin tish-lint

      - name: Lint example Tish sources
        run: |
          ./target/debug/tish-lint \
            examples/http-env-var-example/src \
            examples/hello-world/src

      - name: SARIF smoke (valid JSON)
        run: |
          ./target/debug/tish-lint --format sarif examples/http-env-var-example/src/main.tish > tish-lint.sarif
          python3 -c "import json; json.load(open('tish-lint.sarif'))"

  tree-sitter-tish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tree-sitter-tish/package-lock.json

      # `--config-path` on `parse`/`test` points at a *grammar project dir* (expects tree-sitter.json inside),
      # not a global CLI config file — so we use the standard agent config for parser-directories.
      - name: Tree-sitter CLI config (parser directories)
        run: |
          mkdir -p "$HOME/.config/tree-sitter"
          printf '%s\n' "{\"parser-directories\":[\"$GITHUB_WORKSPACE/tree-sitter-tish\"]}" > "$HOME/.config/tree-sitter/config.json"

      - name: Generate grammar + parse sample
        working-directory: tree-sitter-tish
        run: |
          # Remove legacy filename if present: a *file* named tree-sitter-ci-config.json makes the
          # CLI try tree-sitter-ci-config.json/tree-sitter.json and warn (os error 20).
          rm -f tree-sitter-ci-config.json
          npm ci
          npx tree-sitter generate
          npx tree-sitter test
          # Subset grammar: smoke file only (full examples/*.tish may not parse yet)
          npx tree-sitter parse examples/smoke.tish
