[workspace]
members = [
    "crates/tish_core",
    "crates/tish_builtins",
    "crates/tish_lexer",
    "crates/tish_ast",
    "crates/tish_parser",
    "crates/tish_eval",
    "crates/tish_runtime",
    "crates/tish_compile",
    "crates/tish",
]
resolver = "2"

[workspace.dependencies]

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3

[profile.bench]
inherits = "release"
debug = true
