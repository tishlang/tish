[workspace]
members = [
    "crates/tish_core",
    "crates/tish_builtins",
    "crates/tish_bind",
    "crates/tish_lexer",
    "crates/tish_ast",
    "crates/tish_parser",
    "crates/tish_eval",
    "crates/tish_runtime",
    "crates/tish_compile",
    "crates/tish_compile_js",
    "crates/tish",
    "crates/tish_polars",
]
resolver = "2"

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3

[profile.bench]
inherits = "release"
debug = true
