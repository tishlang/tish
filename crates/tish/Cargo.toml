[package]
name = "tish"
version = "0.1.0"
edition = "2021"
description = "Tish CLI - run, REPL, compile to native"

[[bin]]
name = "tish"
path = "src/main.rs"

[features]
# Default: secure mode with no dangerous capabilities
default = []
# Full: all capabilities enabled (for development/trusted environments)
full = ["http", "fs", "process", "regex"]
# Individual capability flags
http = ["tish_eval/http", "tish_runtime/http", "tish_compile/http"]
fs = ["tish_eval/fs", "tish_runtime/fs", "tish_compile/fs"]
process = ["tish_eval/process", "tish_runtime/process", "tish_compile/process"]
regex = ["tish_eval/regex", "tish_runtime/regex", "tish_compile/regex"]
polars = ["tish_runtime/polars", "tish_compile/polars"]

[dependencies]
tish_lexer = { path = "../tish_lexer" }
tish_ast = { path = "../tish_ast" }
tish_parser = { path = "../tish_parser" }
tish_eval = { path = "../tish_eval" }
tish_compile = { path = "../tish_compile" }
tish_runtime = { path = "../tish_runtime" }
clap = { version = "4.5.60", features = ["derive"] }
