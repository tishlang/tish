[package]
name = "tish_runtime"
version = "0.1.0"
edition = "2021"
description = "Minimal runtime for Tish compiled output"

[features]
default = []
http = ["tokio", "reqwest", "futures", "tiny_http"]
fs = []
process = []
regex = ["tish_core/regex"]

[dependencies]
tish_core = { path = "../tish_core" }
tish_builtins = { path = "../tish_builtins" }
tokio = { version = "1", features = ["rt-multi-thread", "time", "sync"], optional = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"], optional = true }
futures = { version = "0.3", optional = true }
tiny_http = { version = "0.12", optional = true }
