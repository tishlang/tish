[package]
name = "tish_wasm_runtime"
version = "0.1.0"
edition = "2021"
description = "Tish VM compiled to WebAssembly for browser execution"

[lib]
crate-type = ["cdylib"]

[dependencies]
tish_bytecode = { path = "../tish_bytecode" }
tish_vm = { path = "../tish_vm", features = ["wasm"] }
wasm-bindgen = "0.2"
